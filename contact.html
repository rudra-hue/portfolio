<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rudra Parmar — Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Exo+2:wght@400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- CURSOR -->
  <div id="cursor"></div>
  <div id="cursor-trail"></div>

  <!-- LOADER -->
  <div id="loader">
    <div class="loader-text">POWERING UP...</div>
    <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
    <div style="font-family:'Orbitron',monospace;font-size:0.65rem;letter-spacing:4px;color:rgba(0,212,255,0.6);">RUDRA PARMAR — INITIALIZING</div>
  </div>

  <!-- PARTICLES -->
  <canvas id="particles-canvas"></canvas>

  <div class="min-h-screen relative selection:bg-blue-500/30">
    <div class="fixed inset-0 pointer-events-none z-0"></div>
    <div class="fixed inset-0 grid-bg pointer-events-none z-0 opacity-40"></div>
    <nav class="fixed top-0 w-full z-50 px-8 py-6 flex justify-between items-center backdrop-blur-md bg-black/10 border-b border-white/5">
      <a id="nav-logo-link" href="index.html" class="text-2xl font-black tracking-tighter text-white hover:text-orange-400 transition-colors">RP<span class="text-orange-500">.</span></a>
            <!-- Mobile Menu Button -->
      <button id="mobile-menu-btn" class="md:hidden text-white hover:text-orange-400 focus:outline-none">
        <iconify-icon icon="lucide:menu" class="text-3xl"></iconify-icon>
      </button>

      <div class="hidden md:flex gap-10 items-center font-medium text-white/70">
        <a id="nav-home-link" href="index.html" class="hover:text-orange-400 transition-colors uppercase text-xs tracking-widest">Home</a>
        <a id="nav-about-link" href="about.html" class="hover:text-orange-400 transition-colors uppercase text-xs tracking-widest">About</a>
        <a id="nav-skills-link" href="skills.html" class="hover:text-orange-400 transition-colors uppercase text-xs tracking-widest">Skills</a>
        <a id="nav-projects-link" href="projects.html" class="hover:text-orange-400 transition-colors uppercase text-xs tracking-widest">Projects</a>
        <a id="nav-contact-link" href="contact.html" class="px-6 py-2 bg-white text-black bg-cyan-400 transition-all font-bold rounded-full uppercase text-xs tracking-widest">Hire Me</a>
      </div>

      <!-- Mobile Menu -->
      <div id="mobile-menu" class="absolute top-full left-0 w-full bg-black/95 border-b border-white/10 flex flex-col items-center py-6 gap-6 md:hidden z-50 transition-all duration-300 ease-out opacity-0 pointer-events-none -translate-y-4">
        <a id="mobile-nav-home-link" href="index.html" class="hover:text-orange-400 transition-colors uppercase text-xs tracking-widest">Home</a>
        <a id="mobile-nav-about-link" href="about.html" class="hover:text-orange-400 transition-colors uppercase text-xs tracking-widest">About</a>
        <a id="mobile-nav-skills-link" href="skills.html" class="hover:text-orange-400 transition-colors uppercase text-xs tracking-widest">Skills</a>
        <a id="mobile-nav-projects-link" href="projects.html" class="hover:text-orange-400 transition-colors uppercase text-xs tracking-widest">Projects</a>
        <a id="mobile-nav-contact-link" href="contact.html" class="px-6 py-2 bg-white text-black bg-cyan-400 transition-all font-bold rounded-full uppercase text-xs tracking-widest">Hire Me</a>
      </div>
    </nav>
    <main class="relative z-10 pt-24">
      <section id="contact" class="py-20 bg-orange-500 text-black min-h-[calc(100vh-100px)]">
        <div class="max-w-7xl mx-auto px-8 grid lg:grid-cols-2 gap-20 items-center pt-16">
          <div class="space-y-8">
            <h2 class="text-6xl md:text-8xl font-black leading-tight tracking-tighter">LET'S BUILD<br />SOMETHING<br />LEGENDARY.</h2>
            <div class="space-y-4">
              <p class="text-xl font-bold opacity-80 uppercase tracking-widest">Available for collaborations</p>
              <div class="flex gap-6">
                <!-- User only provided GitHub link in index.html -->
                <a id="social-github" href="https://github.com/rudra-hue" target="_blank" class="text-2xl hover:scale-125 transition-transform"><iconify-icon icon="lucide:github"></iconify-icon></a>
                <!-- Adding placeholders for others they might want -->
                <a id="social-twitter" href="#" class="text-2xl hover:scale-125 transition-transform"><iconify-icon icon="lucide:twitter"></iconify-icon></a>
                <a id="social-dribbble" href="#" class="text-2xl hover:scale-125 transition-transform"><iconify-icon icon="lucide:linkedin"></iconify-icon></a>
              </div>
            </div>
          </div>
          <div class="bg-black p-10 space-y-8 perspective-1000">
            <div class="space-y-2">
              <label class="block text-xs font-black uppercase tracking-[0.3em] text-white/40">Full Name</label>
              <input type="text" placeholder="John Doe" class="w-full bg-transparent border-b border-white/20 py-4 text-white focus:outline-none focus:border-cyan-400 transition-colors">
            </div>
            <div class="space-y-2">
              <label class="block text-xs font-black uppercase tracking-[0.3em] text-white/40">Email Address</label>
              <input type="email" placeholder="hello@world.com" class="w-full bg-transparent border-b border-white/20 py-4 text-white focus:outline-none focus:border-cyan-400 transition-colors">
            </div>
            <div class="space-y-2">
              <label class="block text-xs font-black uppercase tracking-[0.3em] text-white/40">The Mission</label>
              <textarea rows="4" placeholder="What's the vision?" class="w-full bg-transparent border-b border-white/20 py-4 text-white focus:outline-none focus:border-cyan-400 transition-colors resize-none"></textarea>
            </div>
            <button class="w-full bg-orange-500 py-6 text-black font-black uppercase tracking-widest hover:bg-white transition-all">Transmit Message</button>
          </div>
        </div>
      </section>
    </main>
    <footer class="py-12 border-t border-white/5 px-8 flex flex-col md:flex-row justify-between items-center gap-8 text-white/40 text-xs font-bold uppercase tracking-widest">
      <p>© 2026 Rudra Parmar. All rights reserved.</p>
      <div class="flex gap-8">
        <a href="https://github.com/rudra-hue" target="_blank" class="hover:text-white transition-colors">GitHub</a>
      </div>
      <p>Designed for the digital elite.</p>
        </footer>
  </div>
  <script src="main.js?v=5"></script>
</body>


</html>
