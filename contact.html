<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rudra Parmar — Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <style>
    @import url('https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,900&f[]=satoshi@400,500,700&display=swap');

    :root {
      --bg: #050505;
      --accent-cyan: #00f2ff;
      --accent-magenta: #7000ff;
      --surface: #111111;
    }

    body {
      font-family: 'Satoshi', sans-serif;
      background-color: var(--bg);
      color: #fff;
      overflow-x: hidden;
    }

    h1, h2, h3 { font-family: 'Cabinet Grotesk', sans-serif; }
    .perspective-1000 { perspective: 1000px; }
    .preserve-3d { transform-style: preserve-3d; }
    .neon-glow-cyan { text-shadow: 0 0 10px rgba(0, 242, 255, 0.5), 0 0 20px rgba(0, 242, 255, 0.3); }

    .bg-noise { background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); opacity: 0.1; }

    .grid-bg {
      background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    .section-transition { transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
  </style>
</head>

<body>
  <div class="min-h-screen relative selection:bg-cyan-500/30">
    <div class="fixed inset-0 bg-noise pointer-events-none z-0"></div>
    <div class="fixed inset-0 grid-bg pointer-events-none z-0 opacity-40"></div>
    <nav class="fixed top-0 w-full z-50 px-8 py-6 flex justify-between items-center backdrop-blur-md bg-black/10 border-b border-white/5">
      <a id="nav-logo-link" href="index.html" class="text-2xl font-black tracking-tighter text-white hover:text-cyan-400 transition-colors">RP<span class="text-cyan-500">.</span></a>
            <!-- Mobile Menu Button -->
      <button id="mobile-menu-btn" class="md:hidden text-white hover:text-cyan-400 focus:outline-none">
        <iconify-icon icon="lucide:menu" class="text-3xl"></iconify-icon>
      </button>

      <div class="hidden md:flex gap-10 items-center font-medium text-white/70">
        <a id="nav-home-link" href="index.html" class="hover:text-cyan-400 transition-colors uppercase text-xs tracking-widest">Home</a>
        <a id="nav-about-link" href="about.html" class="hover:text-cyan-400 transition-colors uppercase text-xs tracking-widest">About</a>
        <a id="nav-skills-link" href="skills.html" class="hover:text-cyan-400 transition-colors uppercase text-xs tracking-widest">Skills</a>
        <a id="nav-projects-link" href="projects.html" class="hover:text-cyan-400 transition-colors uppercase text-xs tracking-widest">Projects</a>
        <a id="nav-contact-link" href="contact.html" class="px-6 py-2 bg-white text-black bg-cyan-400 transition-all font-bold rounded-full uppercase text-xs tracking-widest">Hire Me</a>
      </div>

      <!-- Mobile Menu -->
      <div id="mobile-menu" class="absolute top-full left-0 w-full bg-black/95 border-b border-white/10 flex-col items-center py-6 gap-6 hidden md:hidden z-50">
        <a id="mobile-nav-home-link" href="index.html" class="hover:text-cyan-400 transition-colors uppercase text-xs tracking-widest">Home</a>
        <a id="mobile-nav-about-link" href="about.html" class="hover:text-cyan-400 transition-colors uppercase text-xs tracking-widest">About</a>
        <a id="mobile-nav-skills-link" href="skills.html" class="hover:text-cyan-400 transition-colors uppercase text-xs tracking-widest">Skills</a>
        <a id="mobile-nav-projects-link" href="projects.html" class="hover:text-cyan-400 transition-colors uppercase text-xs tracking-widest">Projects</a>
        <a id="mobile-nav-contact-link" href="contact.html" class="px-6 py-2 bg-white text-black bg-cyan-400 transition-all font-bold rounded-full uppercase text-xs tracking-widest">Hire Me</a>
      </div>
    </nav>
    <main class="relative z-10 pt-24">
      <section id="contact" class="py-20 bg-cyan-500 text-black min-h-[calc(100vh-100px)]">
        <div class="max-w-7xl mx-auto px-8 grid lg:grid-cols-2 gap-20 items-center pt-16">
          <div class="space-y-8">
            <h2 class="text-6xl md:text-8xl font-black leading-tight tracking-tighter">LET'S BUILD<br />SOMETHING<br />LEGENDARY.</h2>
            <div class="space-y-4">
              <p class="text-xl font-bold opacity-80 uppercase tracking-widest">Available for collaborations</p>
              <div class="flex gap-6">
                <!-- User only provided GitHub link in index.html -->
                <a id="social-github" href="https://github.com/rudra-hue" target="_blank" class="text-2xl hover:scale-125 transition-transform"><iconify-icon icon="lucide:github"></iconify-icon></a>
                <!-- Adding placeholders for others they might want -->
                <a id="social-twitter" href="#" class="text-2xl hover:scale-125 transition-transform"><iconify-icon icon="lucide:twitter"></iconify-icon></a>
                <a id="social-dribbble" href="#" class="text-2xl hover:scale-125 transition-transform"><iconify-icon icon="lucide:linkedin"></iconify-icon></a>
              </div>
            </div>
          </div>
          <div class="bg-black p-10 space-y-8 perspective-1000">
            <div class="space-y-2">
              <label class="block text-xs font-black uppercase tracking-[0.3em] text-white/40">Full Name</label>
              <input type="text" placeholder="John Doe" class="w-full bg-transparent border-b border-white/20 py-4 text-white focus:outline-none focus:border-cyan-400 transition-colors">
            </div>
            <div class="space-y-2">
              <label class="block text-xs font-black uppercase tracking-[0.3em] text-white/40">Email Address</label>
              <input type="email" placeholder="hello@world.com" class="w-full bg-transparent border-b border-white/20 py-4 text-white focus:outline-none focus:border-cyan-400 transition-colors">
            </div>
            <div class="space-y-2">
              <label class="block text-xs font-black uppercase tracking-[0.3em] text-white/40">The Mission</label>
              <textarea rows="4" placeholder="What's the vision?" class="w-full bg-transparent border-b border-white/20 py-4 text-white focus:outline-none focus:border-cyan-400 transition-colors resize-none"></textarea>
            </div>
            <button class="w-full bg-cyan-500 py-6 text-black font-black uppercase tracking-widest hover:bg-white transition-all">Transmit Message</button>
          </div>
        </div>
      </section>
    </main>
    <footer class="py-12 border-t border-white/5 px-8 flex flex-col md:flex-row justify-between items-center gap-8 text-white/40 text-xs font-bold uppercase tracking-widest">
      <p>© 2026 Rudra Parmar. All rights reserved.</p>
      <div class="flex gap-8">
        <a href="https://github.com/rudra-hue" target="_blank" class="hover:text-white transition-colors">GitHub</a>
      </div>
      <p>Designed for the digital elite.</p>
    </footer>
  </div>
  <script>
    const observerOptions = { threshold: 0.1 };
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('opacity-100', 'translate-y-0');
          entry.target.classList.remove('opacity-0', 'translate-y-10');
        }
      });
    }, observerOptions);
    document.querySelectorAll('section').forEach(section => {
      section.classList.add('opacity-0', 'translate-y-10', 'section-transition');
      observer.observe(section);
    });
  </script>

  <!-- Mobile Menu Script -->
  <script>
    const mobileBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    if(mobileBtn && mobileMenu) {
      mobileBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
        mobileMenu.classList.toggle('flex');
      });
    }
  </script>
</body>


</html>
